name: Fetch TikTok Videos

on:
  schedule:
    - cron: "0 * * * *"   # every hour
  workflow_dispatch:       # manual run button

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

  - name: Install tools
  run: |
    sudo apt update
    sudo apt install -y ffmpeg python3 jq
    pip install yt-dlp

      - name: Clean old videos
        run: |
          rm -f *.mp4
          rm -f feed.json

      - name: Download TikTok videos
        run: |
          yt-dlp "ytsearch10:tiktok viral" -o "raw%(id)s.%(ext)s"

      - name: Convert for Wii
        run: |
          i=0
          for f in raw*.mp4; do
            ffmpeg -i "$f" -vf scale=320:240 -c:v libx264 -preset ultrafast -c:a aac "video$i.mp4"
            i=$((i+1))
          done

      - name: Generate feed.json
        run: |
          ls video*.mp4 | jq -R -s -c 'split("\n")[:-1]' > feed.json

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Auto update TikTok feed" || echo "No changes"
          git push
