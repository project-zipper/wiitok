name: Update Video Feed (Safe YouTube Shorts)

on:
  schedule:
    - cron: "*/45 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y ffmpeg python3 jq
          pip install yt-dlp

      # Ensure tiktok-feed folder exists
      - name: Prepare folder
        run: |
          mkdir -p tiktok-feed
          rm -f tiktok-feed/*.mp4 tiktok-feed/raw*.mp4 tiktok-feed/list.json

      # Download videos safely
      - name: Download Shorts
        run: |
          # Use 15 videos max for stability
          yt-dlp "ytsearch15:youtube shorts funny vertical" \
          -f mp4 \
          --max-filesize 15M \
          -o "tiktok-feed/raw%(id)s.%(ext)s" || echo "Download failed but continuing"

      # Convert videos safely
      - name: Convert videos
        run: |
          i=0
          for f in tiktok-feed/raw*.mp4; do
            if [ -f "$f" ]; then
              ffmpeg -y -i "$f" \
              -vf scale=320:240 \
              -c:v libx264 -preset ultrafast \
              -c:a aac \
              "tiktok-feed/video$i.mp4" || echo "Conversion failed for $f, skipping"
              i=$((i+1))
            fi
          done

      # Generate list.json safely
      - name: Generate list.json
        run: |
          echo "[" > tiktok-feed/list.json
          first=1
          for f in tiktok-feed/video*.mp4; do
            if [ -f "$f" ]; then
              name=$(basename "$f")
              if [ $first -eq 0 ]; then echo "," >> tiktok-feed/list.json; fi
              echo "{\"title\":\"$name\",\"file\":\"$name\"}" >> tiktok-feed/list.json
              first=0
            fi
          done
          echo "]" >> tiktok-feed/list.json

      # Commit and push without failing
      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add tiktok-feed/
          git diff --cached --quiet || echo "No changes to commit"
          git commit -m "Update Shorts feed (safe)" || echo "Nothing to commit"
          git push || echo "Push failed but continuing"
