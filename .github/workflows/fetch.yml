name: Update TikTok Feed (Stable)

on:
  schedule:
    - cron: "*/45 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y ffmpeg python3 jq
          pip install yt-dlp

      - name: Remove old videos
        run: |
          rm -f *.mp4
          rm -f raw*.mp4
          rm -f list.json

      - name: Download TikTok videos safely
        run: |
          yt-dlp "ytsearch6:tiktok viral funny" -o "raw%(id)s.%(ext)s" || echo "Download errors ignored"

      - name: Convert videos safely
        run: |
          i=0
          for f in raw*.mp4; do
            if [ -f "$f" ]; then
              ffmpeg -i "$f" -vf scale=320:240 -c:v libx264 -preset ultrafast -c:a aac "video$i.mp4"
              i=$((i+1))
            fi
          done

      - name: Generate list.json
        run: |
          echo "[" > list.json
          first=1
          for f in video*.mp4; do
            name=$(basename "$f")
            title="Video ${name%.*}"
            if [ $first -eq 0 ]; then echo "," >> list.json; fi
            echo "{\"title\":\"$title\",\"file\":\"$name\"}" >> list.json
            first=0
          done
          echo "]" >> list.json

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git diff --cached --quiet || echo "No changes"
          git commit -m "Auto refresh TikTok feed (45 min)" || echo "No changes"
          git push
